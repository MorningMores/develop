name: Frontend E2E

on:
  push:
    branches: [ main, FE-Testing, BE_Testing_Midterm, BE_Testing_Final ]
  pull_request:
    branches: [ main, BE_Testing_Midterm, BE_Testing_Final ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: main_frontend/concert1/package-lock.json

      - name: Start backend stack (MySQL + backend)
        run: |
          docker compose up -d mysql backend
          echo "Waiting for backend..."
          for i in {1..60}; do
            if curl -sf http://localhost:8080/actuator/health | grep 'UP'; then echo OK; break; fi; sleep 2; done

      - name: Cypress run (Electron)
        uses: cypress-io/github-action@v6
        with:
          working-directory: main_frontend/concert1
          browser: electron
          start: npm run dev
          wait-on: 'http://localhost:3000/concert'
          wait-on-timeout: 120
          install-command: npm install
        env:
          CYPRESS_baseUrl: http://localhost:3000/concert

      - name: Upload Cypress screenshots/videos (if exist)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            main_frontend/concert1/cypress/screenshots
            main_frontend/concert1/cypress/videos
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          docker compose down
