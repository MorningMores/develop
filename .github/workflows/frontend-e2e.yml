name: Frontend E2E

on:
  push:
    branches: [ main, BE-Tester, Tester, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    name: Full Stack E2E (Cypress)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: concert_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main_frontend/concert1/package-lock.json

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P3306 -uroot -ppassword --silent; then
              echo "MySQL ready"
              break
            fi
            sleep 2
          done

      - name: Build backend
        working-directory: ./main_backend
        run: ./mvnw clean package -DskipTests -B

      - name: Start backend
        working-directory: ./main_backend
        run: |
          nohup ./mvnw spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/concert_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: password

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -f http://localhost:8080/actuator/health 2>/dev/null; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

      - name: Install frontend deps
        working-directory: ./main_frontend/concert1
        run: npm ci

      - name: Build frontend
        working-directory: ./main_frontend/concert1
        run: npm run build

      - name: Start frontend
        working-directory: ./main_frontend/concert1
        run: |
          nohup npm run preview > frontend.log 2>&1 &
          echo $! > frontend.pid
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8080

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000 2>/dev/null; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done

      - name: Run Cypress
        working-directory: ./main_frontend/concert1
        run: npx cypress run
        continue-on-error: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: main_frontend/concert1/cypress/screenshots/
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: main_frontend/concert1/cypress/videos/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          [ -f main_frontend/concert1/frontend.pid ] && kill $(cat main_frontend/concert1/frontend.pid) || true
          [ -f main_backend/backend.pid ] && kill $(cat main_backend/backend.pid) || true
