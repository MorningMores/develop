name: Backend Tests

on:
  push:
    branches: [ main, BE-Tester, Tester, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Unit Tests - Fast, no external dependencies
  unit-tests:
    name: Unit Tests (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run unit tests
        working-directory: ./main_backend
        run: ./mvnw clean test -P unit-tests -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Generate coverage report
        if: always()
        working-directory: ./main_backend
        run: ./mvnw jacoco:report -B
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: main_backend/target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: main_backend/target/site/jacoco/
          retention-days: 7

  # Integration Tests - Requires MySQL (GitHub Actions service)
  integration-tests:
    name: Integration Tests (GitHub Actions)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: concert_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P3306 -uroot -ppassword --silent; then
              echo "MySQL is ready!"
              break
            fi
            sleep 2
          done

      - name: Run integration tests
        working-directory: ./main_backend
        run: ./mvnw test -P integration-tests -B
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/concert_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: password
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: main_backend/target/surefire-reports/
          retention-days: 7
