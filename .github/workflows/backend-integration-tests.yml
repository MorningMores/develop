name: Backend Integration Tests

on:
  push:
    branches: [ main, BE-Tester, Tester, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: backend-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: concert_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P3306 -uroot -ppassword --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run all tests with coverage
        working-directory: ./main_backend
        run: |
          ./mvnw clean test jacoco:report -B -Djacoco.haltOnFailure=false
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Run integration tests
        working-directory: ./main_backend
        run: |
          ./mvnw verify -P integration-tests -B
        env:
          SPRING_PROFILES_ACTIVE: test
        continue-on-error: false

      - name: Check coverage threshold (80%)
        working-directory: ./main_backend
        run: |
          ./mvnw jacoco:check -Djacoco.haltOnFailure=true
        continue-on-error: false

      - name: Generate coverage summary
        if: always()
        working-directory: ./main_backend
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract coverage percentages from JaCoCo HTML report
            MISSED_INSTRUCTIONS=$(grep -oP 'Total.*?<td.*?>\K[\d,]+(?=</td>)' target/site/jacoco/index.html | head -1 || echo "0")
            COVERED_INSTRUCTIONS=$(grep -oP 'Total.*?<td.*?>\K[\d,]+(?=</td>)' target/site/jacoco/index.html | head -2 | tail -1 || echo "0")
            
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 Target: **80%** line and branch coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View detailed report in artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: main_backend/target/site/jacoco/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: main_backend/target/surefire-reports/
          retention-days: 30

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Integration Tests
          path: main_backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: main_backend/target/site/jacoco/jacoco.xml
          flags: integration-tests
          name: backend-integration-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'main_backend/target/site/jacoco/index.html';
            
            if (fs.existsSync(path)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 📊 Test Coverage Report\n\n✅ Coverage report generated. Download the artifact for detailed metrics.\n\n**Target:** 80% line and branch coverage'
              });
            }

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run unit tests only
        working-directory: ./main_backend
        run: |
          ./mvnw test -P unit-tests -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: main_backend/target/surefire-reports/
          retention-days: 7
