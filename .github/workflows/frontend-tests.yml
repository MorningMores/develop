name: Frontend Component Tests (Cypress)

on:
  push:
    branches: [ main, BE-Tester, Tester, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  component-tests:
    name: Component Tests (Cypress)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main_frontend/concert1/package-lock.json

      - name: Install dependencies
        working-directory: ./main_frontend/concert1
        run: npm install

      - name: Run Cypress component tests
        working-directory: ./main_frontend/concert1
        run: npx cypress run --component
        continue-on-error: true

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-component-screenshots
          path: main_frontend/concert1/cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: main_frontend/concert1/coverage/
          retention-days: 7
