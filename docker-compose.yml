version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pj_devop_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: devop_db
      MYSQL_USER: devop_user
      MYSQL_PASSWORD: devop_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./main_backend
    container_name: pj_devop_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devop_db
      SPRING_DATASOURCE_USERNAME: devop_user
      SPRING_DATASOURCE_PASSWORD: devop_pass

  frontend:
    build: ./main_frontend/concert1
    container_name: pj_devop_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
