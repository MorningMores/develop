<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-color: #0D69FF;
            --dark-color: #1A1A1A;
            --text-color: #333333;
            --text-secondary-color: #666666;
            --border-color: #D9D9D9;
            --bg-color: #F7F7F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
        }

        .auth-form h1 {
            color: var(--dark-color);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .auth-form .pre-header {
            color: var(--text-secondary-color);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: var(--text-secondary-color);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 105, 255, 0.1);
        }

        /* Floating label effect */
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 0;
            left: 12px;
            font-size: 0.75rem;
            color: var(--primary-color);
            background-color: #fff;
            padding: 0 5px;
            transform: translateY(-50%);
        }
        
        .password-toggle {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary-color);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-options .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary-color);
        }

        .form-options a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary-color);
            margin: 30px 0;
            font-size: 0.9rem;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .separator:not(:empty)::before {
            margin-right: .25em;
        }

        .separator:not(:empty)::after {
            margin-left: .25em;
        }

        .social-login-btn {
            width: 100%;
            padding: 15px;
            background-color: #fff;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: background-color 0.2s ease;
        }

        .social-login-btn:hover {
            background-color: #f8f9fa;
        }
        
        .social-login-btn img {
            width: 20px;
            height: 20px;
        }
        
        .social-login-btn i {
            font-size: 1.2rem;
        }

        .toggle-link {
            text-align: center;
            margin-top: 30px;
            font-size: 1rem;
        }
        
        .toggle-link a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Login Form -->
        <div id="login-form" class="auth-form">
            <p class="pre-header">Welcome Back</p>
            <h1>Log In to your Account</h1>
            <form action="index.html">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder=" " required>
                    <label for="login-email">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder=" " required>
                    <label for="login-password">Password</label>
                    <i class="fa-regular fa-eye password-toggle" id="login-toggle"></i>
                </div>
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary">CONTINUE</button>
            </form>

            <div class="separator">Or</div>

            <button class="social-login-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Log In with Google
            </button>
            <button class="social-login-btn">
                <i class="fa-brands fa-facebook" style="color:#1877F2;"></i>
                Log In with Facebook
            </button>
            <button class="social-login-btn">
                <i class="fa-brands fa-apple"></i>
                Log In with Apple
            </button>
            <p class="toggle-link">
                New User? <a id="show-signup">SIGN UP HERE</a>
            </p>
        </div>

        <!-- Sign Up Form (Initially Hidden) -->
        <div id="signup-form" class="auth-form" style="display: none;">
            <p class="pre-header">Start for free</p>
            <h1>Create an Account</h1>
            <form action="index.html">
                <div class="input-group">
                    <input type="text" id="signup-name" placeholder=" " required>
                    <label for="signup-name">Full Name</label>
                </div>
                <div class="input-group">
                    <input type="email" id="signup-email" placeholder=" " required>
                    <label for="signup-email">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="signup-password" placeholder=" " required>
                    <label for="signup-password">Password</label>
                    <i class="fa-regular fa-eye password-toggle" id="signup-toggle"></i>
                </div>
                <button type="submit" class="btn-primary">SIGN UP</button>
            </form>
            <p class="toggle-link">
                Already have an account? <a id="show-login">LOG IN</a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const showSignupLink = document.getElementById('show-signup');
            const showLoginLink = document.getElementById('show-login');

            // --- Form Toggling Logic ---
            showSignupLink.addEventListener('click', () => {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            });

            showLoginLink.addEventListener('click', () => {
                signupForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            // --- Password Visibility Toggle Logic ---
            function setupPasswordToggle(inputId, toggleId) {
                const passwordInput = document.getElementById(inputId);
                const passwordToggle = document.getElementById(toggleId);

                passwordToggle.addEventListener('click', () => {
                    // Toggle the type attribute
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // Toggle the icon
                    passwordToggle.classList.toggle('fa-eye');
                    passwordToggle.classList.toggle('fa-eye-slash');
                });
            }

            setupPasswordToggle('login-password', 'login-toggle');
            setupPasswordToggle('signup-password', 'signup-toggle');
        });
    </script>
</body>
</html>
